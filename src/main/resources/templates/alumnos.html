<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Insert title here</title>
</head>
<body>
<h1>Alumnos</h1>
<hr>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>NOMBRE</th>
        <th>APELLIDO</th>
        <th>DIRECCION</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${lista}">
        <td th:text="${p.id}"></td>
        <td th:text="${p.nombre}"></td>
        <td th:text="${p.apellido}"></td>
        <td th:text="${p.direccion}"></td>
    </tr>
    </tbody>

</table>
</body>
</html>
